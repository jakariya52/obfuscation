        function base64ToArrayBuffer(base64) {
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            return bytes.buffer;
        }

        async function deriveKeyPBKDF2(password, salt, iterations) {
            const encoder = new TextEncoder();
            const passwordKey = await window.crypto.subtle.importKey(
                'raw', encoder.encode(password), { name: 'PBKDF2' }, false, ['deriveKey']
            );
            return window.crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt: salt, iterations: iterations, hash: 'SHA-256' },
                passwordKey,
                { name: 'AES-GCM', length: 256 },
                false,
                ['decrypt']
            );
        }

        async function deriveRawKeyPBKDF2(password, salt, iterations) {
            const encoder = new TextEncoder();
            const passwordKey = await window.crypto.subtle.importKey(
                'raw', encoder.encode(password), { name: 'PBKDF2' }, false, ['deriveBits']
            );
            const bits = await window.crypto.subtle.deriveBits(
                { name: 'PBKDF2', salt: salt, iterations: iterations, hash: 'SHA-256' },
                passwordKey,
                256
            );
            return new Uint8Array(bits);
        }

        // FIXED: Accept salt as ArrayBuffer, not base64 string
        async function xorLayerDecrypt(encrypted, password, saltBuf) {
            const keyBytes = await deriveRawKeyPBKDF2(password, new Uint8Array(saltBuf), 100000);
            const encryptedBytes = new Uint8Array(encrypted);
            const result = new Uint8Array(encryptedBytes.length);
            for (let i = 0; i < encryptedBytes.length; i++) {
                result[i] = encryptedBytes[i] ^ keyBytes[i % keyBytes.length];
            }
            return result.buffer;
        }

        async function aesDecrypt(encrypted, key, iv) {
            return window.crypto.subtle.decrypt(
                { name: 'AES-GCM', iv: iv },
                key,
                encrypted
            );
        }

        (async () => {
            try {
                await initWasm();
                const password = getPassword();
                const html = await decryptFull(password);
                document.getElementById('content').innerHTML = html;
            } catch(e) {
                document.getElementById('content').innerHTML = "<div><h2>Error</h2><p>Failed to load content.</p></div>";
                console.error(e);
            }
        })();
